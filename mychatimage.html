<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hypnotic Generative Geometry</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030a;
      font-family: system-ui, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: 16px;
      bottom: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      user-select: none;
      mix-blend-mode: screen;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <canvas id="art"></canvas>
  <div class="hud">Click to shift the trance</div>

  <script>
    const canvas = document.getElementById('art');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let seed = Math.random() * 1000;
    let paletteShift = Math.random() * Math.PI * 2;
    let speedBoost = 1;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function pulse(t, a, b, phase = 0) {
      return lerp(a, b, 0.5 + 0.5 * Math.sin(t + phase));
    }

    function colorAt(t, index, alpha) {
      const hue = (
        220
        + 120 * Math.sin(t * 0.22 + index * 0.33 + paletteShift)
        + 80 * Math.sin(t * 0.11 - index * 0.17 + seed)
      ) % 360;

      const sat = pulse(t * 0.8 + index * 0.2, 65, 100, index * 0.1);
      const light = pulse(t * 1.2 + index * 0.35, 45, 72, index * 0.6);
      return `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
    }

    function drawRingField(t, cx, cy, radiusBase) {
      const layers = 22;
      for (let i = 0; i < layers; i++) {
        const p = i / layers;
        const r = radiusBase * (0.12 + p * 1.05) * (1 + 0.06 * Math.sin(t * 1.4 + i));
        const petals = Math.floor(6 + 18 * p + 5 * Math.sin(t * 0.7 + i * 0.2));
        const amp = 8 + 48 * p;
        const steps = 220;

        ctx.beginPath();
        for (let s = 0; s <= steps; s++) {
          const a = (s / steps) * Math.PI * 2;
          const mod = Math.sin(a * petals + t * (0.9 + p * 1.8) + i * 0.7);
          const mod2 = Math.cos(a * (petals * 0.5 + 1) - t * 1.1 + i);
          const rr = r + mod * amp + mod2 * amp * 0.35;
          const x = cx + Math.cos(a) * rr;
          const y = cy + Math.sin(a) * rr;
          if (s === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = colorAt(t, i, 0.07 + p * 0.16);
        ctx.lineWidth = 0.7 + p * 2.4;
        ctx.stroke();
      }
    }

    function drawOrbitingPolygons(t, cx, cy, radiusBase) {
      const count = 14;
      for (let i = 0; i < count; i++) {
        const p = i / count;
        const orbit = radiusBase * (0.16 + p * 0.72);
        const angle = t * (0.22 + p * 0.5) * (i % 2 === 0 ? 1 : -1) + i * 0.7;
        const x = cx + Math.cos(angle) * orbit * (1 + 0.22 * Math.sin(t * 0.9 + i));
        const y = cy + Math.sin(angle) * orbit * (1 + 0.22 * Math.cos(t * 0.7 + i));
        const sides = 3 + (i % 7);
        const rot = -angle * 1.8 + t * 0.3;
        const size = 12 + p * radiusBase * 0.16 * (1 + 0.4 * Math.sin(t * 1.8 + i));

        ctx.beginPath();
        for (let s = 0; s <= sides; s++) {
          const a = rot + (s / sides) * Math.PI * 2;
          const wobble = 1 + 0.18 * Math.sin(t * 2 + s * 2 + i);
          const px = x + Math.cos(a) * size * wobble;
          const py = y + Math.sin(a) * size * wobble;
          if (s === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }

        ctx.strokeStyle = colorAt(t + 2, i + 30, 0.18);
        ctx.lineWidth = 1 + p * 2.2;
        ctx.stroke();
      }
    }

    function drawRadialBeams(t, cx, cy, radiusBase) {
      const beams = 90;
      for (let i = 0; i < beams; i++) {
        const a = (i / beams) * Math.PI * 2 + t * 0.12;
        const inner = radiusBase * (0.08 + 0.05 * Math.sin(t * 2 + i));
        const outer = radiusBase * (0.55 + 0.35 * Math.sin(t * 0.55 + i * 0.17));
        const bend = 0.25 * Math.sin(t * 1.7 + i * 0.9);

        const x1 = cx + Math.cos(a) * inner;
        const y1 = cy + Math.sin(a) * inner;
        const mx = cx + Math.cos(a + bend) * (inner + outer) * 0.5;
        const my = cy + Math.sin(a + bend) * (inner + outer) * 0.5;
        const x2 = cx + Math.cos(a) * outer;
        const y2 = cy + Math.sin(a) * outer;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(mx, my, x2, y2);
        ctx.strokeStyle = colorAt(t + 1.5, i + 80, 0.045);
        ctx.lineWidth = 0.8 + 1.4 * (0.5 + 0.5 * Math.sin(i + t));
        ctx.stroke();
      }
    }

    function drawCore(t, cx, cy, radiusBase) {
      const rings = 10;
      for (let i = 0; i < rings; i++) {
        const r = radiusBase * (0.04 + i * 0.027) * (1 + 0.18 * Math.sin(t * 2.1 + i));
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = colorAt(t + 3, i + 120, 0.22 - i * 0.012);
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radiusBase * 0.18);
      grad.addColorStop(0, colorAt(t + 4, 180, 0.85));
      grad.addColorStop(0.45, colorAt(t + 2, 181, 0.2));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.fillStyle = grad;
      ctx.arc(cx, cy, radiusBase * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground(t) {
      const grad = ctx.createRadialGradient(
        w * 0.5,
        h * 0.5,
        0,
        w * 0.5,
        h * 0.5,
        Math.max(w, h) * 0.75
      );
      grad.addColorStop(0, `hsla(${220 + 40 * Math.sin(t * 0.18)}, 80%, 8%, 0.18)`);
      grad.addColorStop(0.5, `hsla(${260 + 60 * Math.sin(t * 0.11 + 1)}, 85%, 4%, 0.12)`);
      grad.addColorStop(1, 'rgba(0,0,0,0.28)');

      ctx.fillStyle = 'rgba(2, 3, 10, 0.1)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function frame(ms) {
      const t = ms * 0.001 * speedBoost + seed;

      drawBackground(t);

      const cx = w * 0.5 + Math.sin(t * 0.27) * w * 0.035;
      const cy = h * 0.5 + Math.cos(t * 0.21) * h * 0.03;
      const radiusBase = Math.min(w, h) * 0.42;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      drawRadialBeams(t, cx, cy, radiusBase);
      drawRingField(t, cx, cy, radiusBase);
      drawOrbitingPolygons(t, cx, cy, radiusBase);
      drawCore(t, cx, cy, radiusBase);
      ctx.restore();

      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);

    window.addEventListener('click', () => {
      paletteShift += Math.PI / 3;
      seed = Math.random() * 1000;
      speedBoost = 0.85 + Math.random() * 0.9;
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === ' ') {
        e.preventDefault();
        paletteShift += Math.PI / 2;
        speedBoost = 0.85 + Math.random() * 1.1;
      }
    });

    resize();
    ctx.fillStyle = '#02030a';
    ctx.fillRect(0, 0, w, h);
    requestAnimationFrame(frame);
  </script>
</body>
</html>
